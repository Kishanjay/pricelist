server {
    listen 80;
    server_name pricelist.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pricelist.example.com;

    ssl_certificate /etc/letsencrypt/live/pricelist.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pricelist.example.com/privkey.pem;

    root /var/www/pricelist/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must not be cached
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /registerSW.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
